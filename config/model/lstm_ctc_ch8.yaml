# @package _global_
module:
  _target_: emg2qwerty.lightning.LSTMCTCModule
  in_features: 264
  mlp_features: [384]
  hidden_size: 384
  num_layers: 3
  dropout: 0.3
  bidirectional: true
  electrode_channels: 8

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

channel_subset:
  _target_: emg2qwerty.transforms.ChannelSubset
  n_channels: 8

transforms:
  train:
    - ${to_tensor}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${logspec}
    - ${specaug}
    - ${channel_subset}
  val:
    - ${to_tensor}
    - ${logspec}
    - ${channel_subset}
  test: ${transforms.val}